# CDSS Configuration Settings

pipeline:
  # Options: gemini, openai, anthropic
  provider: "gemini"
  # The specific model variant to execute
  model_name: "gemini-2.5-flash"
  temperature: 0.1

evaluation:
  # Options: gemini, openai, anthropic
  judge_provider: "gemini"
  judge_model: "gemini-2.5-flash"
  judge_temperature: 0.0
  # Target success threshold defined in methodology
  success_threshold: 4.0
  metrics:
    - "biological_synthesis"
    - "systematic_reasoning"
    - "clinical_actionability"